name: Deploy Backend (Azure Container Apps)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: steeves-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build and Push Image
        run: |
          set -euo pipefail
          SHA_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          LATEST_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:latest"
          # ubuntu-latest runners are amd64 — image is natively compatible with Azure Container Apps
          docker build -t "$SHA_TAG" -t "$LATEST_TAG" ./backend
          docker push "$SHA_TAG"
          docker push "$LATEST_TAG"
          echo "SHA_TAG=$SHA_TAG" >> $GITHUB_ENV

      - name: Update Container App secrets
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade
          # DATABASE_URL stored as a secret to avoid shell-interpolating @ and # in the password
          az containerapp secret set \
            --name "${{ secrets.CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --secrets \
              "dburl=${{ secrets.DATABASE_URL }}" \
              "openrouter-key=${{ secrets.OPENROUTER_API_KEY }}"

      - name: Deploy to Azure Container Apps
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${{ secrets.CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --image "$SHA_TAG" \
            --set-env-vars \
              "DATABASE_URL=secretref:dburl" \
              "OPENROUTER_API_KEY=secretref:openrouter-key" \
              "LLM_PROVIDER=openrouter" \
              "FLASK_ENV=production" \
              "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"

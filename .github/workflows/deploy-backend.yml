name: Deploy Backend (Azure Container Apps)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  IMAGE_NAME: steeves-and-associates-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Build and Push Image
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" ./backend
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Azure Container Apps
        run: |
          set -euo pipefail
          az extension add --name containerapp --upgrade
          az containerapp update \
            --name "${{ secrets.CONTAINERAPP_NAME }}" \
            --resource-group "${{ secrets.RESOURCE_GROUP }}" \
            --image "$IMAGE_TAG" \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
              LLM_PROVIDER="openrouter" \
              CORS_ORIGINS="${{ secrets.CORS_ORIGINS }}" \
              POWERBI_CLIENT_ID="${{ secrets.POWERBI_CLIENT_ID }}" \
              POWERBI_CLIENT_SECRET="${{ secrets.POWERBI_CLIENT_SECRET }}" \
              POWERBI_TENANT_ID="${{ secrets.POWERBI_TENANT_ID }}" \
              POWERBI_WORKSPACE_ID="${{ secrets.POWERBI_WORKSPACE_ID }}" \
              POWERBI_DATASET_ID="${{ secrets.POWERBI_DATASET_ID }}" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
